name: 공개 증거 채널 검증

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5

      - name: Node.js 설정
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: runtime 버전 출력
        run: node --version

      - name: 공개 예제 검증
        run: npm run verify
